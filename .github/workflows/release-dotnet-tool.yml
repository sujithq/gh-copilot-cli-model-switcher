name: Release .NET Tool

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example, gh-copilot-byok-v1.1.0 or v1.1.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: dotnet/CopilotX/CopilotX.csproj
      TEST_PROJECT_PATH: dotnet/CopilotX.Tests/CopilotX.Tests.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore $PROJECT_PATH --nologo

      - name: Build
        run: dotnet build $PROJECT_PATH -c Release --no-restore --nologo

      - name: Test
        run: dotnet run --project $TEST_PROJECT_PATH -c Release --nologo

      - name: Pack
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="$RELEASE_TAG"
          if [ -n "$DISPATCH_TAG" ]; then
            TAG="$DISPATCH_TAG"
          fi

          # Support both v1.2.3 and gh-copilot-byok-v1.2.3 tag formats.
          VERSION="${TAG##*-v}"
          VERSION="${VERSION#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Could not parse semantic version from tag '$TAG'"
            exit 1
          fi

          dotnet pack $PROJECT_PATH -c Release --no-build --nologo /p:Version="$VERSION"

      - name: Push package to GitHub Packages (NuGet)
        env:
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push dotnet/CopilotX/nupkg/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --source "https://nuget.pkg.github.com/$OWNER/index.json" \
            --skip-duplicate

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.event.release.tag_name }}
          append_body: false
          files: |
            dotnet/CopilotX/nupkg/*.nupkg

name: Release .NET Tool

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (e.g., 2.1.0, v2.1.0, or copilot-byok-model-switcher-v2.1.0)
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to publish (e.g., 2.1.0, v2.1.0, or copilot-byok-model-switcher-v2.1.0)
        required: true
        type: string
    secrets:
      NUGET_API_KEY:
        required: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: dotnet/CopilotX/CopilotX.csproj
      TEST_PROJECT_PATH: dotnet/CopilotX.Tests/CopilotX.Tests.csproj
    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          sparse-checkout: release-please-config.json
          sparse-checkout-cone-mode: false

      - name: Resolve tag reference
        id: resolve_tag
        run: |
          INPUT_TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          
          # Extract package name from release-please-config.json
          PACKAGE_NAME=$(jq -r '.packages["."]["package-name"]' release-please-config.json)
          
          # If input looks like a bare semantic version (e.g., 2.1.0), prepend the full tag prefix
          if [[ "$INPUT_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            FULL_TAG="$PACKAGE_NAME-v$INPUT_TAG"
          else
            FULL_TAG="$INPUT_TAG"
          fi
          
          echo "tag=$FULL_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $FULL_TAG"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_tag.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore $PROJECT_PATH --nologo

      - name: Build
        run: dotnet build $PROJECT_PATH -c Release --no-restore --nologo

      - name: Test
        run: dotnet run --project $TEST_PROJECT_PATH -c Release --nologo

      - name: Pack
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          # Support both v1.2.3 and copilot-byok-model-switcher-v1.2.3 tag formats.
          VERSION="${TAG##*-v}"
          VERSION="${VERSION#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Could not parse semantic version from tag '$TAG'"
            exit 1
          fi

          dotnet pack $PROJECT_PATH -c Release --no-build --nologo /p:Version="$VERSION"

      - name: Push package to GitHub Packages (NuGet)
        env:
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push dotnet/CopilotX/nupkg/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --source "https://nuget.pkg.github.com/$OWNER/index.json" \
            --skip-duplicate

      - name: Push package to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push dotnet/CopilotX/nupkg/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          append_body: false
          files: |
            dotnet/CopilotX/nupkg/*.nupkg

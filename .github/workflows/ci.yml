name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - claude/**

jobs:
  node-tests:
    name: Node tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodejs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  dotnet-tests:
    name: .NET tests and pack validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build tool
        run: dotnet build dotnet/CopilotX/CopilotX.csproj -c Release --nologo

      - name: Run tests
        run: dotnet run --project dotnet/CopilotX.Tests/CopilotX.Tests.csproj -c Release --nologo

      - name: Pack tool
        run: dotnet pack dotnet/CopilotX/CopilotX.csproj -c Release --no-build --nologo
